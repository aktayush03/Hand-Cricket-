<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportify Hand Cricket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); min-height: 100vh; }
    </style>
</head>
<body class="p-4 font-sans text-slate-800">

    <div id="app" class="max-w-md mx-auto space-y-6">
        <header class="text-center text-white py-6">
            <h1 class="text-3xl font-bold tracking-tight">SPORTIFY</h1>
            <p class="opacity-80">Hand Cricket Tournament Manager</p>
        </header>

        <section id="setup" class="glass p-6 rounded-2xl shadow-xl">
            <h2 class="text-xl font-bold mb-4">Player Registration</h2>
            <textarea id="playerList" class="w-full p-3 border rounded-lg h-32 mb-4" placeholder="Enter names (one per line)...">Player 1
Player 2
Player 3
Player 4
Player 5
Player 6
Player 7
Player 8</textarea>
            <button onclick="startTournament()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Generate Tournament</button>
        </section>

        <section id="dashboard" class="hidden space-y-6">
            <div class="glass p-4 rounded-2xl shadow-lg">
                <h2 class="text-lg font-bold mb-3 flex justify-between">
                    Points Table 
                    <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded">Group Stage</span>
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm" id="pointsTable">
                        <thead>
                            <tr class="border-b">
                                <th class="py-2">Player</th>
                                <th>P</th>
                                <th>W</th>
                                <th>Pts</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="glass p-4 rounded-2xl shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">Fixtures</h2>
                    <button onclick="copyFixtures()" class="text-xs bg-slate-200 px-3 py-1 rounded-full font-medium">Copy Fixtures</button>
                </div>
                <div id="matchList" class="space-y-3"></div>
            </div>

            <div id="knockoutSection" class="hidden glass p-4 rounded-2xl shadow-lg border-2 border-yellow-400">
                <h2 class="text-lg font-bold mb-3 text-yellow-700">Final (Qualifiers)</h2>
                <div id="finalMatch"></div>
            </div>
        </section>

        <section id="winnerScreen" class="hidden glass p-10 rounded-2xl shadow-2xl text-center animate-bounce">
            <h2 class="text-4xl mb-2">🏆</h2>
            <h1 class="text-2xl font-black text-blue-900">TOURNAMENT CHAMPION</h1>
            <p id="winnerName" class="text-3xl mt-4 font-bold text-orange-500"></p>
            <button onclick="location.reload()" class="mt-8 text-blue-600 underline text-sm">Reset Tournament</button>
        </section>
    </div>

    <script>
        let players = [];
        let matches = [];

        function startTournament() {
            const input = document.getElementById('playerList').value;
            players = input.split('\n').filter(n => n.trim() !== '').map(name => ({
                name: name.trim(),
                played: 0,
                won: 0,
                points: 0
            }));

            if (players.length < 2) return alert("Need at least 2 players!");

            generateRoundRobin();
            renderPointsTable();
            renderMatches();

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function generateRoundRobin() {
            matches = [];
            for (let i = 0; i < players.length; i++) {
                for (let j = i + 1; j < players.length; j++) {
                    matches.push({ p1: players[i].name, p2: players[j].name, s1: null, s2: null, complete: false });
                }
            }
        }

        function updateScore(index, p1Score, p2Score) {
            const m = matches[index];
            m.s1 = parseInt(p1Score);
            m.s2 = parseInt(p2Score);
            m.complete = (p1Score !== "" && p2Score !== "");
            
            recalculateStats();
        }

        function recalculateStats() {
            players.forEach(p => { p.played = 0; p.won = 0; p.points = 0; });
            
            matches.forEach(m => {
                if (m.complete) {
                    const player1 = players.find(p => p.name === m.p1);
                    const player2 = players.find(p => p.name === m.p2);
                    player1.played++;
                    player2.played++;
                    if (m.s1 > m.s2) { player1.won++; player1.points += 2; }
                    else if (m.s2 > m.s1) { player2.won++; player2.points += 2; }
                }
            });

            renderPointsTable();
            checkQualifiers();
        }

        function renderPointsTable() {
            const tbody = document.querySelector('#pointsTable tbody');
            const sorted = [...players].sort((a, b) => b.points - a.points);
            tbody.innerHTML = sorted.map(p => `
                <tr class="border-b">
                    <td class="py-2 font-medium">${p.name}</td>
                    <td>${p.played}</td>
                    <td>${p.won}</td>
                    <td class="font-bold">${p.points}</td>
                </tr>
            `).join('');
        }

        function renderMatches() {
            const container = document.getElementById('matchList');
            container.innerHTML = matches.map((m, i) => `
                <div class="flex items-center justify-between bg-white p-3 rounded-lg border">
                    <div class="text-sm font-semibold w-1/3">${m.p1}</div>
                    <div class="flex gap-2 w-1/3 justify-center">
                        <input type="number" placeholder="0" class="w-10 border text-center rounded" oninput="updateScore(${i}, this.value, nextElementSibling.value)" value="${m.s1 ?? ''}">
                        <span>vs</span>
                        <input type="number" placeholder="0" class="w-10 border text-center rounded" oninput="updateScore(${i}, previousElementSibling.previousElementSibling.value, this.value)" value="${m.s2 ?? ''}">
                    </div>
                    <div class="text-sm font-semibold w-1/3 text-right">${m.p2}</div>
                </div>
            `).join('');
        }

        function checkQualifiers() {
            const allFinished = matches.every(m => m.complete);
            if (allFinished) {
                const sorted = [...players].sort((a, b) => b.points - a.points);
                const p1 = sorted[0];
                const p2 = sorted[1];
                
                document.getElementById('knockoutSection').classList.remove('hidden');
                document.getElementById('finalMatch').innerHTML = `
                    <div class="flex items-center justify-between bg-yellow-50 p-4 rounded-xl border border-yellow-200 mt-2">
                        <span class="font-bold">${p1.name}</span>
                        <button onclick="declareWinner('${p1.name}')" class="bg-yellow-500 text-white text-xs px-3 py-1 rounded">Winner</button>
                        <span class="text-gray-400">VS</span>
                        <button onclick="declareWinner('${p2.name}')" class="bg-yellow-500 text-white text-xs px-3 py-1 rounded">Winner</button>
                        <span class="font-bold">${p2.name}</span>
                    </div>
                `;
            }
        }

        function declareWinner(name) {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('winnerScreen').classList.remove('hidden');
            document.getElementById('winnerName').innerText = name;
        }

        function copyFixtures() {
            const text = matches.map(m => `${m.p1} vs ${m.p2}`).join('\n');
            navigator.clipboard.writeText(text);
            alert("Fixtures copied to clipboard!");
        }
    </script>
</body>
</html>
