<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportify: Royal Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --silver: #c0c0c0; --bronze: #cd7f32; --dark: #0f172a; }
        body { 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            font-family: 'Outfit', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .antique-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--gold);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }
        .gold-text { color: var(--gold); font-family: 'Cinzel', serif; }
        .gold-btn {
            background: linear-gradient(135deg, #d4af37 0%, #f97316 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .rank-1 { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        .rank-2 { border: 1px solid var(--silver); }
        .rank-3 { border: 1px solid var(--bronze); }
        
        @keyframes crown-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .crown { animation: crown-float 2s ease-in-out infinite; }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-4xl gold-text tracking-widest">SPORTIFY</h1>
            <p class="text-[10px] uppercase tracking-[0.4em] opacity-50">The Grand Tournament</p>
        </header>

        <section id="setupScreen" class="antique-card rounded-3xl p-6">
            <h2 class="gold-text text-xl mb-4 text-center">Register Legends</h2>
            <textarea id="playerInput" class="w-full bg-slate-900/50 p-4 rounded-xl mb-4 h-32 border border-slate-700 outline-none" placeholder="Enter Names...">Arjun&#10;Vikram&#10;Zaid&#10;Karan</textarea>
            <button onclick="initTournament()" class="w-full gold-btn py-4 rounded-2xl font-bold uppercase tracking-widest">Seal the Roster</button>
        </section>

        <section id="dashScreen" class="hidden space-y-6">
            <div class="antique-card rounded-2xl p-4">
                <h3 class="gold-text text-sm mb-3">Live Standings</h3>
                <table class="w-full text-left text-sm">
                    <tbody id="pointsBody"></tbody>
                </table>
            </div>
            <div id="fixtureList" class="space-y-3"></div>
        </section>

        <section id="gameScreen" class="hidden antique-card rounded-3xl p-6 relative">
            <div id="tossLayer" class="text-center py-10">
                <h2 class="gold-text text-2xl mb-8">The Sacred Toss</h2>
                <div class="flex justify-around">
                    <button onclick="playToss('Heads')" class="w-24 h-24 rounded-full border-2 border-gold gold-text text-sm hover:bg-gold hover:text-black transition">HEADS</button>
                    <button onclick="playToss('Tails')" class="w-24 h-24 rounded-full border-2 border-gold gold-text text-sm hover:bg-gold hover:text-black transition">TAILS</button>
                </div>
            </div>

            <div id="playLayer" class="hidden">
                <div class="flex justify-between items-end border-b border-slate-800 pb-4 mb-6">
                    <div>
                        <p id="battingName" class="gold-text text-xl leading-tight"></p>
                        <p class="text-[10px] uppercase tracking-widest opacity-50">Currently Batting</p>
                    </div>
                    <div class="text-right">
                        <p id="currentScore" class="text-4xl font-black">0</p>
                        <p id="wicketStatus" class="text-[10px] text-red-500 font-bold uppercase tracking-tighter">Wickets: 0/2</p>
                    </div>
                </div>
                <div class="text-center h-16 mb-6">
                    <p id="gameFeedback" class="text-sm italic opacity-80"></p>
                    <p id="targetText" class="gold-text font-bold text-lg mt-1"></p>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <script>
                        for(let i=1; i<=6; i++) document.write(`<button onclick="playHand(${i})" class="gold-btn py-5 rounded-2xl text-2xl font-bold">${i}</button>`);
                    </script>
                </div>
            </div>
        </section>

        <section id="rankingScreen" class="hidden space-y-6 pb-10">
            <div class="text-center py-6">
                <div class="text-6xl crown mb-2">👑</div>
                <h1 class="gold-text text-3xl">Hall of Fame</h1>
                <p class="text-xs opacity-50 uppercase tracking-[0.2em]">Tournament Concluded</p>
            </div>
            
            <div id="podiumList" class="space-y-4">
                </div>

            <button onclick="location.reload()" class="w-full py-4 text-xs uppercase tracking-widest opacity-30 hover:opacity-100 transition">Start New Era</button>
        </section>
    </div>

    <script>
        let players = [];
        let fixtures = [];
        let activeMatchIdx = null;
        let gameState = {};

        function initTournament() {
            const lines = document.getElementById('playerInput').value.split('\n').filter(l => l.trim());
            players = lines.map(n => ({ name: n.trim(), p: 0, w: 0, pts: 0, runsScored: 0 }));
            
            fixtures = [];
            for(let i=0; i<players.length; i++) {
                for(let j=i+1; j<players.length; j++) {
                    fixtures.push({ p1: players[i].name, p2: players[j].name, status: 'Upcoming' });
                }
            }
            showScreen('dashScreen');
            renderDash();
        }

        function renderDash() {
            const sorted = [...players].sort((a,b) => b.pts - a.pts || b.runsScored - a.runsScored);
            document.getElementById('pointsBody').innerHTML = sorted.map(p => `
                <tr class="border-b border-slate-800/50">
                    <td class="py-3 font-semibold">${p.name}</td>
                    <td class="text-xs opacity-50">P:${p.p}</td>
                    <td class="gold-text font-bold text-right">${p.pts} PTS</td>
                </tr>
            `).join('');

            document.getElementById('fixtureList').innerHTML = fixtures.map((f, i) => `
                <div class="antique-card p-4 rounded-2xl flex justify-between items-center ${f.status === 'Complete' ? 'opacity-30' : ''}">
                    <span class="text-sm font-medium">${f.p1} <span class="text-gold mx-1">VS</span> ${f.p2}</span>
                    ${f.status === 'Upcoming' ? `<button onclick="startMatch(${i})" class="gold-btn px-4 py-1 rounded-full text-[10px] font-bold">PLAY</button>` : `<span class="text-[10px] text-green-500 font-bold italic">FINISHED</span>`}
                </div>
            `).join('');

            if(fixtures.every(f => f.status === 'Complete')) showRankings();
        }

        function startMatch(idx) {
            activeMatchIdx = idx;
            showScreen('gameScreen');
            document.getElementById('tossLayer').classList.remove('hidden');
            document.getElementById('playLayer').classList.add('hidden');
        }

        function playToss(choice) {
            const outcome = Math.random() > 0.5 ? 'Heads' : 'Tails';
            const tossWinner = outcome === choice ? fixtures[activeMatchIdx].p1 : fixtures[activeMatchIdx].p2;
            const tossLoser = tossWinner === fixtures[activeMatchIdx].p1 ? fixtures[activeMatchIdx].p2 : fixtures[activeMatchIdx].p1;
            
            gameState = { batting: tossWinner, bowling: tossLoser, score: 0, wickets: 0, innings: 1, target: Infinity, isOver: false };
            document.getElementById('tossLayer').classList.add('hidden');
            document.getElementById('playLayer').classList.remove('hidden');
            updateUI();
        }

        function playHand(userMove) {
            const cpuMove = Math.floor(Math.random() * 6) + 1;
            const feedback = document.getElementById('gameFeedback');
            
            if(userMove === cpuMove) {
                gameState.wickets++;
                feedback.innerHTML = `<span class="text-red-500 font-bold animate-pulse">WICKET!</span> Both showed ${userMove}`;
            } else {
                gameState.score += userMove;
                players.find(p => p.name === gameState.batting).runsScored += userMove;
                feedback.innerHTML = `Batter: ${userMove} | Bowler: ${cpuMove}`;
            }

            if(gameState.wickets >= 2) {
                if(gameState.innings === 1) {
                    gameState.target = gameState.score + 1;
                    gameState.innings = 2; gameState.wickets = 0; gameState.score = 0;
                    [gameState.batting, gameState.bowling] = [gameState.bowling, gameState.batting];
                    alert(`Target: ${gameState.target}`);
                } else endMatch(gameState.bowling);
            } else if(gameState.innings === 2 && gameState.score >= gameState.target) {
                endMatch(gameState.batting);
            }
            updateUI();
        }

        function endMatch(winnerName) {
            const f = fixtures[activeMatchIdx];
            f.status = 'Complete';
            players.find(p => p.name === f.p1).p++;
            players.find(p => p.name === f.p2).p++;
            players.find(p => p.name === winnerName).pts += 2;
            players.find(p => p.name === winnerName).w++;
            showScreen('dashScreen');
            renderDash();
        }

        function showRankings() {
            showScreen('rankingScreen');
            const sorted = [...players].sort((a,b) => b.pts - a.pts || b.runsScored - a.runsScored);
            const container = document.getElementById('podiumList');
            
            container.innerHTML = sorted.map((p, i) => {
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'opacity-70';
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
                
                return `
                <div class="antique-card p-5 rounded-2xl flex items-center justify-between ${rankClass} transform transition hover:scale-105">
                    <div class="flex items-center gap-4">
                        <span class="text-2xl">${medal}</span>
                        <div>
                            <h4 class="${i === 0 ? 'gold-text text-xl' : 'text-md font-bold'}">${p.name}</h4>
                            <p class="text-[10px] uppercase opacity-50">${p.w} Wins • ${p.runsScored} Total Runs</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black gold-text">${p.pts}</span>
                        <p class="text-[8px] opacity-40">POINTS</p>
                    </div>
                </div>`;
            }).join('');
        }

        function updateUI() {
            document.getElementById('battingName').innerText = gameState.batting;
            document.getElementById('currentScore').innerText = gameState.score;
            document.getElementById('wicketStatus').innerText = `Wickets: ${gameState.wickets}/2`;
            document.getElementById('targetText').innerText = gameState.innings === 2 ? `Target: ${gameState.target}` : 'First Innings';
        }

        function showScreen(id) {
            ['setupScreen', 'dashScreen', 'gameScreen', 'rankingScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
